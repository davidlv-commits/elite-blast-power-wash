<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank you | Elite Blast Power Wash</title>
    <meta name="description" content="Thank you for contacting Elite Blast Power Wash." />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .thanks-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 16px;
      }

      .thanks-card {
        width: min(680px, 100%);
        padding: 36px;
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(8, 47, 99, 0.08);
        box-shadow: var(--shadow);
        text-align: center;
      }

      .thanks-card h1 {
        margin: 0 0 14px;
        font-family: "League Spartan", sans-serif;
        font-size: clamp(2.3rem, 5vw, 3.5rem);
        line-height: 0.95;
        text-transform: uppercase;
      }

      .thanks-card p {
        margin: 0 0 22px;
        color: var(--muted);
        line-height: 1.8;
      }

      .thanks-actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <main class="thanks-shell">
      <section class="thanks-card">
        <img src="assets/logo-elite-blast.png" alt="Elite Blast Power Wash" class="footer-logo" style="margin: 0 auto 18px;" />
        <h1 id="thanks-title">Request received</h1>
        <p id="thanks-copy">We received your request and will get back to you soon. If your project is urgent, call us directly.</p>
        <div class="thanks-actions">
          <a class="button button-primary" href="tel:+12015897668" id="thanks-call">Call now</a>
          <a class="button button-secondary" href="index.html" id="thanks-home">Back to site</a>
        </div>
      </section>
    </main>
    <script>
      const lang = new URLSearchParams(window.location.search).get("lang") === "es" ? "es" : "en";
      const copy = {
        en: {
          title: "Request received",
          body: "We received your request and will get back to you soon. If your project is urgent, call us directly.",
          call: "Call now",
          home: "Back to site"
        },
        es: {
          title: "Solicitud recibida",
          body: "Hemos recibido tu solicitud y te responderemos pronto. Si tu proyecto es urgente, llamanos directamente.",
          call: "Llamar ahora",
          home: "Volver a la web"
        }
      }[lang];

      document.documentElement.lang = lang;
      document.getElementById("thanks-title").textContent = copy.title;
      document.getElementById("thanks-copy").textContent = copy.body;
      document.getElementById("thanks-call").textContent = copy.call;
      document.getElementById("thanks-home").textContent = copy.home;
    </script>
  </body>
</html>
